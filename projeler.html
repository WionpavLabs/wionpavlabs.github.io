<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projeler | Wionpia Labs</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="logo.png">


<style>

html{
scroll-behavior:smooth;
}


body{

margin:0;

font-family:'Inter',sans-serif;

color:#e2e8f0;

line-height:1.6;


background:
radial-gradient(circle at top,#14365f 0%,#0b2342 28%,#071322 55%,#040812 100%);

background-attachment:fixed;

}


body::before{

content:"";

position:fixed;

top:-250px;

left:-250px;

width:700px;

height:700px;

border-radius:50%;


background:radial-gradient(circle,

rgba(56,189,248,.18),

transparent 70%);


filter:blur(70px);

z-index:-1;

}



body::after{

content:"";

position:fixed;

bottom:-300px;

right:-250px;

width:750px;

height:750px;

border-radius:50%;


background:radial-gradient(circle,

rgba(37,99,235,.16),

transparent 70%);


filter:blur(80px);

z-index:-1;

}



/* SCIENCE BACKGROUND */

.science-background{

position:fixed;

inset:0;

overflow:hidden;

pointer-events:none;

z-index:0;

}



.dna-line{

position:absolute;

width:120px;

height:520px;

opacity:.08;


background:

repeating-linear-gradient(

45deg,

transparent 0 18px,

#38bdf8 19px 21px,

transparent 22px 40px

);


border-left:2px solid #38bdf8;

border-right:2px solid #38bdf8;

border-radius:50%;


}


.dna-right{

right:12%;

top:15%;

}


.dna-left{

left:12%;

top:15%;

}



.particle{

position:absolute;

width:8px;

height:8px;

background:#38bdf8;

border-radius:50%;

box-shadow:0 0 15px #38bdf8;

}


.p1{
top:20%;
left:15%;
}

.p2{
top:65%;
left:25%;
}

.p3{
top:35%;
right:25%;
}

.p4{
bottom:20%;
right:15%;
}

.p5{
top:75%;
left:70%;
}




/* MENU */


.menu-toggle{
position:fixed;
top:15px;
left:15px;
font-size:26px;
color:#38bdf8;
cursor:pointer;
z-index:999;
}



nav{

display:flex;

justify-content:center;

align-items:center;

gap:25px;


position:sticky;

top:15px;

width:fit-content;

margin:auto;


padding:16px 38px;

border-radius:22px;


background:rgba(17,24,39,.35);

backdrop-filter:blur(25px);


border:1px solid rgba(255,255,255,.08);


box-shadow:

0 15px 40px rgba(0,0,0,.35);


z-index:999;

}



nav a{

color:#e2e8f0;

text-decoration:none;

transition:.3s;

}



nav a:hover,

nav a.active{

color:#38bdf8;

}




/* MAIN */


main{

max-width:900px;

margin:40px auto;

padding:0 20px;

position:relative;

z-index:2;

}



/* INDEX SECTION TASARIMI */


section{

margin-bottom:40px;

padding:30px;


background:rgba(17,24,39,.72);


backdrop-filter:blur(20px);


border:1px solid rgba(255,255,255,.06);


border-radius:22px;


box-shadow:

0 20px 60px rgba(0,0,0,.35);


transition:.35s;


position:relative;

overflow:hidden;

}



section:hover{

transform:translateY(-6px);


border-color:rgba(56,189,248,.18);


box-shadow:

0 25px 70px rgba(56,189,248,.12);

}




section::before{

content:"";

position:absolute;

inset:0;

border-radius:22px;

padding:1px;


background:

linear-gradient(

120deg,

transparent,

#38bdf8,

transparent

);


-webkit-mask:

linear-gradient(#000 0 0) content-box,

linear-gradient(#000 0 0);


-webkit-mask-composite:xor;

}



h2{

color:#38bdf8;

}




footer{

margin-top:80px;

padding:40px 20px;

text-align:center;

color:#94a3b8;


border-top:

1px solid rgba(56,189,248,.15);


background:

rgba(17,24,39,.35);


backdrop-filter:blur(15px);

}



@media(max-width:768px){


nav{

display:none;

flex-direction:column;

width:100%;

border-radius:0;

}



nav.active{

display:flex;

}



.menu-toggle{

display:block;

}


section{

padding:22px;

}


.dna-line{

width:75px;

height:330px;

opacity:.05;

}

}


</style>


</head>


<body>
